<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; color: var(--text); }
  .wrap { padding: 22px 26px; }
  .row { display: flex; gap: 28px; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: var(--radius-sm);
          font-family: var(--font-mono); font-size: var(--text-xs); font-weight: var(--weight-medium); width: fit-content; }
  .read { background: var(--op-read-bg); color: var(--op-read-fg); }
  .mutate { background: var(--op-mutate-bg); color: var(--op-mutate-fg); }
  .destructive { background: var(--op-destructive-bg); color: var(--op-destructive-fg); }
  .desc { font-size: var(--text-xs); color: var(--text-muted); }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="col">
        <span class="pill read">READ</span>
        <span class="desc">observes state, changes nothing</span>
        <span class="tok">--op-read</span>
      </div>
      <div class="col">
        <span class="pill mutate">MUTATE</span>
        <span class="desc">changes state, recoverable</span>
        <span class="tok">--op-mutate</span>
      </div>
      <div class="col">
        <span class="pill destructive">DELETE</span>
        <span class="desc">irreversible / data loss</span>
        <span class="tok">--op-destructive</span>
      </div>
    </div>
  </div>
</body>
</html>
