<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; color: var(--text); }
  .wrap { padding: 22px 26px; display: flex; gap: 14px; flex-wrap: wrap; }
  .chip { display: flex; flex-direction: column; gap: 6px; }
  .sw { width: 84px; height: 48px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
  .nm { font-size: 11px; color: var(--text); font-weight: var(--weight-medium); }
  .hx { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="chip"><div class="sw" style="background:var(--blue-600)"></div><span class="nm">Accent</span><span class="hx">#2563eb</span><span class="tok">--accent</span></div>
    <div class="chip"><div class="sw" style="background:var(--blue-700)"></div><span class="nm">Accent hover</span><span class="hx">#1d4ed8</span><span class="tok">--accent-hover</span></div>
    <div class="chip"><div class="sw" style="background:var(--blue-50)"></div><span class="nm">Accent soft</span><span class="hx">#eff6ff</span><span class="tok">--accent-soft</span></div>
    <div class="chip"><div class="sw" style="background:var(--indigo-500)"></div><span class="nm">Relational</span><span class="hx">#6366f1</span><span class="tok">--rel-ring</span></div>
  </div>
</body>
</html>
