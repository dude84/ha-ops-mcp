<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; color: var(--text); }
  .wrap { padding: 22px 26px; display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: var(--radius-sm);
          font-size: var(--text-xs); font-weight: var(--weight-medium); }
  .ok { background: var(--state-ok-bg); color: var(--state-ok-fg); }
  .fail { background: var(--state-fail-bg); color: var(--state-fail-fg); }
  .banner { padding: 8px 12px; border-radius: var(--radius-lg); font-size: var(--text-sm); }
  .b-ok { background: var(--banner-ok-bg); color: var(--banner-ok-fg); }
  .b-fail { background: var(--banner-fail-bg); color: var(--banner-fail-fg); font-family: var(--font-mono); font-size: var(--text-xs); }
  .lbl { font-size: 11px; color: var(--text-faint); font-family: var(--font-mono); width: 92px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <span class="lbl">state pills</span>
      <span class="pill ok">ok</span>
      <span class="pill fail">fail</span>
    </div>
    <div class="row" style="align-items: stretch;">
      <span class="lbl" style="align-self: center;">banners</span>
      <span class="banner b-ok">Reverted 3 target(s).</span>
      <span class="banner b-fail">Rollback partial: 1 target failed — see audit log.</span>
    </div>
  </div>
</body>
</html>
