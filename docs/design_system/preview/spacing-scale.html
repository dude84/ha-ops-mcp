<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; color: var(--text); }
  .wrap { padding: 20px 26px; display: flex; gap: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--accent); border-radius: 2px; width: 100%; }
  .box { display: flex; align-items: flex-end; height: 56px; }
  .nm { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .px { font-size: 10px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="box"><div class="bar" style="width:2px;height:2px"></div></div><span class="nm">0.5</span><span class="px">2px</span></div>
    <div class="item"><div class="box"><div class="bar" style="width:4px;height:4px"></div></div><span class="nm">1</span><span class="px">4px</span></div>
    <div class="item"><div class="box"><div class="bar" style="width:8px;height:8px"></div></div><span class="nm">2</span><span class="px">8px</span></div>
    <div class="item"><div class="box"><div class="bar" style="width:12px;height:12px"></div></div><span class="nm">3</span><span class="px">12px</span></div>
    <div class="item"><div class="box"><div class="bar" style="width:16px;height:16px"></div></div><span class="nm">4</span><span class="px">16px</span></div>
    <div class="item"><div class="box"><div class="bar" style="width:24px;height:24px"></div></div><span class="nm">6</span><span class="px">24px</span></div>
  </div>
</body>
</html>
