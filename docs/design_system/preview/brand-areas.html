<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; color: var(--text); }
  .wrap { padding: 18px 26px; }
  .grid { display: flex; flex-wrap: wrap; gap: 8px 14px; }
  .area { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-faint); }
  .note { font-size: 11px; color: var(--text-muted); margin-top: 12px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <span class="area">·config·</span><span class="area">·automation·</span><span class="area">·script·</span>
      <span class="area">·scene·</span><span class="area">·dashboard·</span><span class="area">·entity·</span>
      <span class="area">·registry·</span><span class="area">·database·</span><span class="area">·system·</span>
      <span class="area">·addon·</span><span class="area">·shell·</span><span class="area">·helper·</span>
      <span class="area">·backup·</span><span class="area">·service·</span><span class="area">·references·</span>
    </div>
    <p class="note">15 subsystem areas — text tags, mono, <code>--text-faint</code>. Never icon-only (accessible baseline).</p>
  </div>
</body>
</html>
