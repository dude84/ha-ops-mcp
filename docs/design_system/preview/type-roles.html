<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; color: var(--text); }
  .wrap { padding: 18px 26px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px 32px; }
  .role { display: flex; align-items: baseline; gap: 12px; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); width: 96px; flex-shrink: 0; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="role"><span class="tok">.ds-wordmark</span><span class="ds-wordmark">HA Ops</span></div>
    <div class="role"><span class="tok">.ds-stat</span><span class="ds-stat">128</span></div>
    <div class="role"><span class="tok">.ds-h2</span><span class="ds-h2">Backups</span></div>
    <div class="role"><span class="tok">.ds-label</span><span class="ds-label">Disk usage</span></div>
    <div class="role"><span class="tok">.ds-body</span><span class="ds-body">Summary of backups.</span></div>
    <div class="role"><span class="tok">.ds-mono</span><span class="ds-mono">/config/.storage</span></div>
    <div class="role"><span class="tok">.ds-muted</span><span class="ds-muted">Mutations only</span></div>
    <div class="role"><span class="tok">.ds-area</span><span class="ds-area">·database·</span></div>
  </div>
</body>
</html>
