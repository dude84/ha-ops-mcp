<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; color: var(--text); }
  .wrap { padding: 22px 26px; }
  .ramp { display: flex; gap: 0; border-radius: var(--radius-sm); overflow: hidden; }
  .sw { flex: 1; height: 56px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 4px; }
  .labels { display: flex; gap: 0; margin-top: 6px; }
  .labels span { flex: 1; text-align: center; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .n { font-family: var(--font-mono); font-size: 9px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="ramp">
      <div class="sw" style="background:var(--gray-50)"></div>
      <div class="sw" style="background:var(--gray-100)"></div>
      <div class="sw" style="background:var(--gray-200)"></div>
      <div class="sw" style="background:var(--gray-300)"></div>
      <div class="sw" style="background:var(--gray-400)"></div>
      <div class="sw" style="background:var(--gray-500)"></div>
      <div class="sw" style="background:var(--gray-600); color:#fff" ><span class="n">600</span></div>
      <div class="sw" style="background:var(--gray-700)"></div>
      <div class="sw" style="background:var(--gray-750)"></div>
      <div class="sw" style="background:var(--gray-800)"></div>
      <div class="sw" style="background:var(--gray-900)"></div>
    </div>
    <div class="labels">
      <span>50</span><span>100</span><span>200</span><span>300</span><span>400</span><span>500</span>
      <span>600</span><span>700</span><span>750</span><span>800</span><span>900</span>
    </div>
  </div>
</body>
</html>
