<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; color: var(--text); }
  .wrap { padding: 18px 26px; display: flex; flex-direction: column; gap: 9px; }
  .line { display: flex; align-items: baseline; gap: 16px; }
  .spec { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); width: 132px; flex-shrink: 0; }
  .sample { color: var(--text); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="line"><span class="spec">2xl · 600 · stat</span><span class="sample" style="font-size:var(--text-2xl);font-weight:600">1.4 GB</span></div>
    <div class="line"><span class="spec">xl · 600 · h2</span><span class="sample" style="font-size:var(--text-xl);font-weight:600">Timeline</span></div>
    <div class="line"><span class="spec">lg · 600 · wordmark</span><span class="sample" style="font-size:var(--text-lg);font-weight:600">HA Ops</span></div>
    <div class="line"><span class="spec">base · 500 · h3</span><span class="sample" style="font-size:var(--text-base);font-weight:500">Self check</span></div>
    <div class="line"><span class="spec">sm · 400 · body</span><span class="sample" style="font-size:var(--text-sm)">Click a row to see the diff.</span></div>
    <div class="line"><span class="spec">xs · 400 · meta</span><span class="sample" style="font-size:var(--text-xs);color:var(--text-muted)">Apr 21, 2026, 14:03:07</span></div>
  </div>
</body>
</html>
