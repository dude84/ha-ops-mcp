<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); color: var(--text); }
  .wrap { padding: 18px 22px; }
  .rowcard { background: var(--surface-raised); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
             padding: 12px 16px; display: flex; gap: 12px; align-items: flex-start; }
  .tri { color: var(--text-faint); font-size: var(--text-xs); font-family: var(--font-mono); margin-top: 2px; }
  .body { flex: 1; min-width: 0; }
  .meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .ts { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-muted); }
  .pill { font-family: var(--font-mono); font-size: var(--text-xs); font-weight: var(--weight-medium);
          padding: 2px 8px; border-radius: var(--radius-sm); }
  .mutate { background: var(--op-mutate-bg); color: var(--op-mutate-fg); }
  .ok { background: var(--state-ok-bg); color: var(--state-ok-fg); font-family: var(--font-sans); }
  .tool { font-size: var(--text-sm); font-weight: var(--weight-medium); }
  .area { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-faint); }
  .summary { font-size: var(--text-sm); color: var(--text); margin-top: 5px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="rowcard">
      <span class="tri">▸</span>
      <div class="body">
        <div class="meta">
          <span class="ts">Apr 21, 2026, 14:03:07</span>
          <span class="pill mutate">MUTATE</span>
          <span class="tool">config_apply</span>
          <span class="area">·automation·</span>
          <span class="pill ok">ok</span>
        </div>
        <div class="summary">Patched automations.yaml — morning lights delay 30 → 45s</div>
      </div>
    </div>
  </div>
</body>
</html>
