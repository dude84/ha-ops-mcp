<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; color: var(--text); }
  .wrap { padding: 20px 26px; display: flex; gap: 40px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
  .sans { font-family: var(--font-sans); font-size: 22px; }
  .mono { font-family: var(--font-mono); font-size: 17px; color: var(--text); }
  .use { font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="col">
      <span class="tag">--font-sans · system-ui</span>
      <span class="sans">Backups &amp; Health</span>
      <span class="use">UI chrome, labels, copy</span>
    </div>
    <div class="col">
      <span class="tag">--font-mono · ui-monospace</span>
      <span class="mono">haops_config_apply</span>
      <span class="use">tools, paths, timestamps, diffs, ·areas·</span>
    </div>
  </div>
</body>
</html>
