<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; font-family: var(--font-sans); background: #fff; color: var(--text); }
  .wrap { padding: 20px 26px; display: flex; align-items: center; gap: 28px; }
  .lock { display: flex; align-items: center; gap: 12px; }
  img { width: 52px; height: 52px; }
  .wm { font-size: 26px; font-weight: var(--weight-semibold); }
  .note { font-size: 11px; color: var(--text-muted); max-width: 280px; line-height: 1.5; }
  .div { width: 1px; align-self: stretch; background: var(--border); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="lock">
      <img src="../assets/logo.png" alt="HA Ops add-on icon">
      <span class="wm">HA Ops</span>
    </div>
    <div class="div"></div>
    <p class="note">The mark — a robot hand gripping a cone drill bit (v1.1 redraw of the original add-on icon). In-app, the header stays <strong>text-only</strong>; the mark is for the add-on store, favicon &amp; docs. SVG + PNG (128/256/512) in <code>assets/</code>.</p>
  </div>
</body>
</html>
