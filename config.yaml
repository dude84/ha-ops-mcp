name: "HA Ops MCP"
version: "0.53.2"
slug: "ha_ops_mcp"
description: "MCP server for Home Assistant operations — database management, config editing, dashboards, entity hygiene, and system health"
url: "https://github.com/dude84/ha-ops-mcp"

arch:
  - aarch64
  - amd64

init: false
startup: "application"
boot: "manual"

# Access to the HA config directory
map:
  - config:rw
  - backup:rw
  - share:rw
  - ssl:ro

# Network ports
ports:
  8901/tcp: 8901
ports_description:
  8901/tcp: "MCP server (streamable-HTTP / SSE transport)"

# Permissions
homeassistant_api: true
hassio_api: true
hassio_role: manager  # needed for addon management tools (list, info, logs, restart)
auth_api: true

host_network: false

# Hardware access — USB devices (generic) + auto-mapped serial/UART nodes.
# Needed so tools can reach USB peripherals directly, e.g. flashing the Zigbee
# coordinator (/dev/ttyUSB*, /dev/serial/by-id/*) in place via the bundled kit.
usb: true
uart: true

options:
  ha_token: ""
  transport: "streamable-http"
  db_url: ""
  backup_dir: "/backup/ha-ops-mcp"
  backup_max_age_days: 30
  backup_max_per_type: 100
  audit_log_reads: true
  log_level: "info"
  auth_enabled: true
  auth_issuer_url: ""
  clear_oauth_on_next_boot: false

schema:
  ha_token: "str?"
  transport: "list(streamable-http|sse)"
  db_url: "str?"
  backup_dir: "str"
  backup_max_age_days: "int(1,3650)"
  backup_max_per_type: "int(1,100000)"
  audit_log_reads: "bool?"
  log_level: "list(debug|info|warning|error)"
  auth_enabled: "bool?"
  auth_issuer_url: "str?"
  clear_oauth_on_next_boot: "bool?"

ingress: true
ingress_port: 8901
ingress_entry: "ui"
panel_icon: "mdi:graph-outline"
panel_title: "HA Ops"

environment:
  HA_OPS_CONFIG_ROOT: "/config"
